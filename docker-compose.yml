version: '3.8'

services:
  database:
    container_name: kupipodariday-database
    image: postgres:14-alpine
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:${PGDATA}
    networks:
      - kupipodariday-network

  backend:
    container_name: kupipodariday-backend
    build:
      context: ./backend
    restart: always
    env_file:
      - .env
    ports:
      - '4000:4000'
    depends_on:
      - database
    networks:
      - kupipodariday-network

  frontend:
    container_name: kupipodariday-frontend
    build:
      context: ./frontend
    restart: always
    ports:
      - '8081:80'
    depends_on:
      - backend
    networks:
      - kupipodariday-network

volumes:
  postgres_data:

networks:
  kupipodariday-network:
    driver: bridge
